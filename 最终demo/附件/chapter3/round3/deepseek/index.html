<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI课程报名 - 掌握未来科技</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>🚀 AI实战课程：90天从入门到精通</h1>
            <p class="subtitle">掌握AI核心技术，开启智能时代新征程</p>
        </div>
    </header>

    <main class="main">
        <section class="highlights">
            <div class="container">
                <h2>课程核心亮点</h2>
                <div class="highlight-grid">
                    <div class="highlight-card">
                        <div class="highlight-icon">
                            <i class="fas fa-brain"></i>
                        </div>
                        <h3>实战驱动学习</h3>
                        <p>20+真实项目案例，从理论到实践全面覆盖</p>
                    </div>
                    <div class="highlight-card">
                        <div class="highlight-icon">
                            <i class="fas fa-users"></i>
                        </div>
                        <h3>专家导师团队</h3>
                        <p>行业资深专家一对一指导，解决学习难题</p>
                    </div>
                    <div class="highlight-card">
                        <div class="highlight-icon">
                            <i class="fas fa-certificate"></i>
                        </div>
                        <h3>认证就业保障</h3>
                        <p>完成课程获得认证，推荐就业机会</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="instructor">
            <div class="container">
                <h2>主讲导师介绍</h2>
                <div class="instructor-profile">
                    <div class="instructor-image">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <div class="instructor-info">
                        <h3>张教授</h3>
                        <p class="title">AI领域首席科学家</p>
                        <p class="bio">10年人工智能研发经验，前Google AI研究员，主导多个国家级AI项目，发表论文30余篇，获得多项技术专利。</p>
                        <div class="expertise">
                            <span class="tag">机器学习</span>
                            <span class="tag">深度学习</span>
                            <span class="tag">自然语言处理</span>
                            <span class="tag">计算机视觉</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="registration">
            <div class="container">
                <h2>立即报名</h2>
                <p class="form-intro">填写以下信息，我们的课程顾问将尽快与您联系</p>
                
                <form class="registration-form" id="registrationForm">
                    <div class="form-group">
                        <label for="name">姓名</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">手机号码</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="company">公司名称</label>
                        <input type="text" id="company" name="company" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="position">职位</label>
                        <input type="text" id="position" name="position" required>
                    </div>
                    
                    <button type="submit" class="submit-btn">立即报名</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 AI教育平台. 版权所有</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
